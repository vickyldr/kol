<!doctype html>
<meta charset="utf-8">
<title>KOL 付款审批自动核对</title>
<style>
  body { font-family: sans-serif; max-width: 720px; margin: 40px auto; }
  #drop {
    border: 3px dashed #aaa; border-radius: 12px; padding: 60px 20px;
    text-align: center; color: #666; cursor: pointer; transition: .2s;
  }
  #drop.hover { border-color: #1976d2; background: #f0f7ff; color: #1976d2; }
  button { font-size: 16px; padding: 10px 28px; margin-top: 16px;
    background: #1976d2; color: #fff; border: 0; border-radius: 8px; cursor: pointer; }
  button:disabled { background: #999; }
  #list { margin-top: 16px; color: #444; font-size: 14px; max-height: 200px; overflow:auto; }
</style>

<h2>KOL 付款审批自动核对</h2>
<p>把当天<b>所有</b>审批单 + 合同一次拖进来（几百个都行，或直接拖一个 zip），点核对，出一张总表。</p>

<div id="drop">
  📂 把文件拖到这里，或点击选择<br><small>支持一次选很多个 PDF，或直接拖一个 .zip 压缩包</small>
  <input id="file" type="file" accept=".pdf,.zip,application/pdf,application/zip" multiple hidden>
</div>
<div id="list"></div>
<button id="go" disabled>开始核对</button>

<script>
  const drop = document.getElementById('drop');
  const input = document.getElementById('file');
  const list = document.getElementById('list');
  const go = document.getElementById('go');
  let files = [];

  function show() {
    list.innerHTML = files.length ? `已选 <b>${files.length}</b> 个文件：<br>` +
      files.map(f => f.name).join('<br>') : '';
    go.disabled = files.length === 0;
  }
  drop.onclick = () => input.click();
  input.onchange = () => { files = [...input.files]; show(); };
  ['dragover','dragenter'].forEach(e => drop.addEventListener(e, ev => {
    ev.preventDefault(); drop.classList.add('hover'); }));
  ['dragleave','drop'].forEach(e => drop.addEventListener(e, ev => {
    ev.preventDefault(); drop.classList.remove('hover'); }));
  drop.addEventListener('drop', ev => { files = [...ev.dataTransfer.files]; show(); });

  go.onclick = async () => {
    go.disabled = true; go.textContent = '核对中…（读 PDF 需要一点时间）';
    const fd = new FormData();
    files.forEach(f => fd.append('files', f));
    const r = await fetch('/audit', { method: 'POST', body: fd });
    document.open(); document.write(await r.text()); document.close();
  };
</script>
